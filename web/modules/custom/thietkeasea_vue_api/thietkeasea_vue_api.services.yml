services:
  thietkeasea_vue_api.content_mapper:
    class: Drupal\thietkeasea_vue_api\Service\ContentMapper
    arguments:
      - '@entity_type.manager'
      - '@date.formatter'
      - '@file_url_generator'
      - '@path_alias.manager'
  thietkeasea_vue_api.demo_content_importer:
    class: Drupal\thietkeasea_vue_api\Service\DemoContentImporter
    arguments:
      - '@entity_type.manager'
      - '@file_system'
      - '@file.repository'
      - '@logger.factory'
