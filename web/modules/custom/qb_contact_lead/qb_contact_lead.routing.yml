qb_contact_lead.submit:
  path: '/api/contact/lead'
  defaults:
    _controller: '\Drupal\qb_contact_lead\Controller\ContactLeadController::submit'
  methods: [POST]
  requirements:
    _permission: 'access content'

qb_contact_lead.settings:
  path: '/admin/config/system/qb-contact-lead'
  defaults:
    _form: '\Drupal\qb_contact_lead\Form\QbContactLeadSettingsForm'
    _title: 'QB Contact Lead settings'
  requirements:
    _permission: 'administer site configuration'
